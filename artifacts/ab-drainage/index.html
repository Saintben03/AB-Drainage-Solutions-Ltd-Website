<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5392B6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta name="author" content="A&B Drainage Solutions Ltd" />
    <meta name="copyright" content="A&B Drainage Solutions Ltd" />

    <!-- Geo targeting -->
    <meta name="geo.region" content="GB-HAM" />
    <meta name="geo.placename" content="Basingstoke, Hampshire" />
    <meta name="geo.position" content="51.2659;-1.0872" />
    <meta name="ICBM" content="51.2659, -1.0872" />

    <!--
      Per-page SEO (title, description, keywords, robots, canonical, Open Graph and
      Twitter tags) is injected into each page's HTML at build time by the prerender
      step (prerender.mjs) and kept in sync at runtime by react-helmet-async (see
      src/components/SEO.tsx). Do not re-add static per-page tags here or they will
      duplicate the prerendered ones.
    -->

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Favicon — default for abdrainage.co.uk -->
    <link id="fav-any" rel="icon" href="/favicon.ico?v=7" sizes="any" />
    <link id="fav-svg" rel="icon" type="image/svg+xml" href="/favicon.svg?v=7" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=7" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=7" />
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png?v=7" />
    <script>
      (function() {
        var h = window.location.hostname;
        var f = null;
        if (h.includes('abconstructionsolutions')) f = '/favicon-construction.png?v=2';
        else if (h.includes('abfencingsolutions')) f = '/favicon-fencing.png?v=2';
        else if (h.includes('abfacilitiesmgmt')) f = '/favicon-facilities.png?v=2';
        if (f) {
          var links = document.querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]');
          for (var i = 0; i < links.length; i++) links[i].parentNode.removeChild(links[i]);
          var l = document.createElement('link');
          l.rel = 'icon';
          l.type = 'image/png';
          l.href = f;
          document.head.appendChild(l);
          var a = document.createElement('link');
          a.rel = 'apple-touch-icon';
          a.href = f;
          document.head.appendChild(a);
        }
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

      ],
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "00:00",

      },
      "priceRange": "££",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Drainage Services Hampshire",

  </head>
  <body class="bg-background text-foreground antialiased selection:bg-primary selection:text-white">

</html>
